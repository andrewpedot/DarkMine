[build]
  command = "npm run build"
  # O Netlify Next.js Runtime configura automaticamente o diretório de publicação (.next)

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
