# ============================================
#  DarkScript — Nginx Reverse Proxy
#  Copiar para: /etc/nginx/sites-available/darkscript
#  Ativar: ln -s /etc/nginx/sites-available/darkscript /etc/nginx/sites-enabled/
# ============================================

# Redirecionar HTTP → HTTPS (ativado após Certbot)
# server {
#     listen 80;
#     server_name darkmine.fun www.darkmine.fun;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name darkmine.fun www.darkmine.fun;

    # Payload grande (roteiros longos)
    client_max_body_size 50M;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/darkscript-access.log;
    error_log  /var/log/nginx/darkscript-error.log;

    # Proxy reverso → Next.js (PM2 na porta 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR / Server Actions)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Headers reais do cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para Server Actions / SSR
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_cache_bypass $http_upgrade;
    }

    # Cache estático do Next.js (_next/static)
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Favicon e arquivos estáticos
    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}
