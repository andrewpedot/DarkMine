server {
    listen 80;
    server_name darkmine.fun www.darkmine.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name darkmine.fun www.darkmine.fun;

    ssl_certificate /etc/nginx/ssl/darkmine.fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/darkmine.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    add_header X-Frame-Options 'SAMEORIGIN' always;
    add_header X-Content-Type-Options 'nosniff' always;
    add_header Referrer-Policy 'strict-origin-when-cross-origin' always;

    access_log /var/log/nginx/darkmine-access.log;
    error_log  /var/log/nginx/darkmine-error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control 'public, max-age=31536000, immutable';
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}
